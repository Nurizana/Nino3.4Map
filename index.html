<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Niño 3.4 Interactive Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Make the map take up the whole screen */
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }

        /* Style the legends so they hover over the map */
        .legend-box {
            position: fixed;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border: 2px solid #333;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            z-index: 9999;
            display: none; /* Hidden by default */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* Stack legends so they don't overlap if multiple are open */
        #leg-nino { top: 15px; }
        #leg-radar { top: 90px; }
        #leg-gif { top: 165px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="leg-nino" class="legend-box">
        <b>Niño 3.4 Region</b><br>
        <span style="color: green;">- - - - - - -</span><br>
        5°N to 5°S, 170°W to 120°W
    </div>

    <div id="leg-radar" class="legend-box">
        <b>Live Weather Radar</b><br>
        Updated: <span id="time-display"></span><br>
        Source: RainViewer API
    </div>

    <div id="leg-gif" class="legend-box">
        <b>Sea Surface Temp (SST)</b><br>
        Live Data Overlay<br>
        Source: NOAA
    </div>

    <script>
        // 1. Initialize the map centered on the Pacific Ocean
        var map = L.map('map', {
            center: [0, -150],
            zoom: 3
        });

        // 2. Add Blue Ocean Basemap and Labels
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Ocean Base'
        }).addTo(map);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Labels'
        }).addTo(map);

        // 3. Create Layer 1: Niño 3.4 Box (Turned ON by default)
        var ninoBox = L.rectangle([[-5, -170], [5, -120]], {
            color: 'green',
            weight: 1.5,
            fill: false,
            dashArray: '5, 5'
        }).addTo(map);
        document.getElementById('leg-nino').style.display = 'block'; // Show legend

        // 4. Create Layer 2: Live Radar (Turned OFF by default)
        var liveRadar = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/nowcast_5/256/{z}/{x}/{y}/1/1_1.png', {
            opacity: 0.6,
            attribution: 'RainViewer'
        });

        // 5. Create Layer 3: Live GIF Overlay (Turned OFF by default)
        var liveGifUrl = "https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_update/sstanim.gif";
        var gifOverlay = L.imageOverlay(liveGifUrl, [[-15, -175], [15, -115]], {
            opacity: 0.6
        });

        // 6. Add the Top-Left Control Menu
        var overlayMaps = {
            "Niño 3.4 Region": ninoBox,
            "Live Radar": liveRadar,
            "Live SST Overlay": gifOverlay
        };
        L.control.layers(null, overlayMaps, { position: 'topleft' }).addTo(map);

        // 7. Update radar time dynamically
        function updateTime() {
            var now = new Date();
            document.getElementById('time-display').innerText = now.toUTCString();
        }
        updateTime(); // Run once

        // 8. Make Legends Appear/Disappear when layers are clicked
        map.on('overlayadd', function(event) {
            if (event.name === "Niño 3.4 Region") {
                document.getElementById('leg-nino').style.display = 'block';
            }
            if (event.name === "Live Radar") {
                updateTime(); // Refresh the time when radar is turned on
                document.getElementById('leg-radar').style.display = 'block';
            }
            if (event.name === "Live SST Overlay") {
                document.getElementById('leg-gif').style.display = 'block';
            }
        });

        map.on('overlayremove', function(event) {
            if (event.name === "Niño 3.4 Region") {
                document.getElementById('leg-nino').style.display = 'none';
            }
            if (event.name === "Live Radar") {
                document.getElementById('leg-radar').style.display = 'none';
            }
            if (event.name === "Live SST Overlay") {
                document.getElementById('leg-gif').style.display = 'none';
            }
        });
    </script>
</body>
</html>
