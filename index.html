<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Map & Live Radar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }

        /* Legend Styling - Bottom Left */
        .info-legend {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border: 2px solid #333;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            display: none; 
            margin-bottom: 10px !important; 
            pointer-events: auto;
        }

        .radar-legend { width: 230px; }

        /* Color Bars */
        .color-bar {
            width: 100%;
            height: 12px;
            margin-top: 8px;
            border: 1px solid #777;
            border-radius: 2px;
        }
        
        .radar-gradient { background: linear-gradient(to right, #00ffff, #0000ff, #00ff00, #ffff00, #ff9900, #ff0000, #ff00ff); }
        .sst-gradient { background: linear-gradient(to right, #000080, #0000ff, #00ffff, #ffff00, #ff0000, #800000); }
        .ssta-gradient { background: linear-gradient(to right, #0000ff, #ffffff, #ff0000); }

        .color-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-top: 3px;
            font-weight: bold;
        }
        
        /* Custom tooltip for the grid */
        .grid-tooltip {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border: 1px solid #ffff66;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="leg-nino" class="info-legend">
        <b>Niño 3.4 Region</b><br>
        <span style="color: green; font-weight: bold; letter-spacing: 2px;">- - - - - -</span><br>
        5°N to 5°S, 170°W to 120°W
    </div>

    <div id="leg-grid" class="info-legend">
        <b>5° Global Grid</b><br>
        <span style="color: #cccc00; font-weight: bold; letter-spacing: 2px;">- - - - - -</span><br>
        Light Yellow Lines
    </div>

    <div id="leg-radar" class="info-legend radar-legend">
        <b>Live Weather Radar</b><br>
        Updated: <span id="time-display">Fetching live data...</span><br>
        <div class="color-bar radar-gradient"></div>
        <div class="color-labels">
            <span>0.1</span><span>1</span><span>5</span><span>10</span><span>25</span><span>50</span><span>100+ mm/h</span>
        </div>
    </div>

    <div id="leg-sst" class="info-legend radar-legend">
        <b>Sea Surface Temp (SST)</b><br>
        Updated Daily (NASA JPL)<br>
        <div class="color-bar sst-gradient"></div>
        <div class="color-labels">
            <span>0°C</span><span>15°C</span><span>35°C</span>
        </div>
    </div>

    <div id="leg-ssta" class="info-legend radar-legend">
        <b>SST Anomaly</b><br>
        Variance from Long-Term Avg<br>
        <div class="color-bar ssta-gradient"></div>
        <div class="color-labels">
            <span>-5°C</span><span>0°C</span><span>+5°C</span>
        </div>
    </div>

    <script>
        // 1. Initialize Map
        var map = L.map('map', { 
            center: [4.21, 101.97], 
            zoom: 5,
            worldCopyJump: true 
        });

        // 2. Add Blue Ocean Basemaps
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Ocean Base'
        }).addTo(map);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Labels'
        }).addTo(map);

        // 3. LAYER: Niño 3.4 Box
        var boxStyle = { color: 'green', weight: 4, fill: false, dashArray: '8, 8' };
        var ninoBox = L.layerGroup([
            L.rectangle([[-5, -170], [5, -120]], boxStyle), 
            L.rectangle([[-5, 190], [5, 240]], boxStyle)    
        ]).addTo(map);

        // 4. LAYER: 5-Degree Grid
        var gridFeatures = [];
        for (var lat = -85; lat <= 85; lat += 5) {
            var latLabel = lat > 0 ? lat + "° N" : (lat < 0 ? Math.abs(lat) + "° S" : "Equator");
            gridFeatures.push({
                "type": "Feature",
                "geometry": { "type": "LineString", "coordinates": [[-360, lat], [360, lat]] },
                "properties": { "name": latLabel }
            });
        }
        for (var lon = -360; lon <= 360; lon += 5) {
            var trueLon = ((lon % 360) + 360) % 360; 
            if (trueLon > 180) trueLon -= 360;
            var lonLabel = trueLon > 0 ? trueLon + "° E" : (trueLon < 0 ? Math.abs(trueLon) + "° W" : "Prime Meridian");
            if (trueLon === 180 || trueLon === -180) lonLabel = "180° Anti-Meridian";

            gridFeatures.push({
                "type": "Feature",
                "geometry": { "type": "LineString", "coordinates": [[lon, -90], [lon, 90]] },
                "properties": { "name": lonLabel }
            });
        }
        var gridLayer = L.geoJSON(gridFeatures, {
            style: { color: "#ffff66", weight: 1.5, opacity: 0.7, dashArray: "4, 4" },
            onEachFeature: function (feature, layer) {
                layer.bindTooltip(feature.properties.name, { sticky: true, className: 'grid-tooltip' });
            }
        });

        // 5. LAYER: Live Radar Data
        var radarGroup = L.layerGroup();
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(res => res.json())
            .then(data => {
                var pastData = data.radar.past[data.radar.past.length - 1];
                var liveRadarUrl = data.host + pastData.path + '/256/{z}/{x}/{y}/2/1_1.png';
                var realRadarLayer = L.tileLayer(liveRadarUrl, { opacity: 0.6, attribution: 'RainViewer' });
                radarGroup.addLayer(realRadarLayer);
                document.getElementById('time-display').innerText = new Date(pastData.time * 1000).toUTCString();
            })
            .catch(e => {
                document.getElementById('time-display').innerText = "Data temporarily unavailable";
            });

        // 6. NEW LAYERS: NOAA CoastWatch ERDDAP WMS (SST & SST Anomaly)
        // Re-added: `crs: L.CRS.EPSG4326` prevents the CORB error.
        var sstLayer = L.tileLayer.wms('https://coastwatch.pfeg.noaa.gov/erddap/wms/jplMURSST41/request', {
            layers: 'jplMURSST41:analysed_sst',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            crs: L.CRS.EPSG4326,
            opacity: 0.65,
            attribution: 'NASA JPL / NOAA CoastWatch',
            colorBarMinimum: 0,
            colorBarMaximum: 35
        });

        var sstAnomLayer = L.tileLayer.wms('https://coastwatch.pfeg.noaa.gov/erddap/wms/jplMURSST41anom1day/request', {
            layers: 'jplMURSST41anom1day:sstAnom',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            crs: L.CRS.EPSG4326,
            opacity: 0.7,
            attribution: 'NASA JPL / NOAA CoastWatch',
            colorBarMinimum: -5,
            colorBarMaximum: 5 
        });

        // 7. Layer Controls (Top Left)
        var overlayMaps = {
            "Niño 3.4 Region": ninoBox,
            "5° Global Grid": gridLayer,
            "Live Radar": radarGroup,
            "Sea Surface Temp (SST)": sstLayer,
            "SST Anomaly": sstAnomLayer
        };
        L.control.layers(null, overlayMaps, { position: 'topleft' }).addTo(map);

        // 8. Embed Legends as Bottom-Left Controls
        var LegendControl = L.Control.extend({
            options: { position: 'bottomleft' },
            initialize: function(id) { this._id = id; },
            onAdd: function (map) { return L.DomUtil.get(this._id); }
        });
        
        map.addControl(new LegendControl('leg-ssta'));
        map.addControl(new LegendControl('leg-sst'));
        map.addControl(new LegendControl('leg-radar'));
        map.addControl(new LegendControl('leg-grid'));
        map.addControl(new LegendControl('leg-nino'));

        document.getElementById('leg-nino').style.display = 'block';

        // 9. Dynamic Legend Toggling
        map.on('overlayadd', function(event) {
            if (event.name === "Niño 3.4 Region") document.getElementById('leg-nino').style.display = 'block';
            if (event.name === "5° Global Grid") document.getElementById('leg-grid').style.display = 'block';
            if (event.name === "Live Radar") document.getElementById('leg-radar').style.display = 'block';
            if (event.name === "Sea Surface Temp (SST)") document.getElementById('leg-sst').style.display = 'block';
            if (event.name === "SST Anomaly") document.getElementById('leg-ssta').style.display = 'block';
        });

        map.on('overlayremove', function(event) {
            if (event.name === "Niño 3.4 Region") document.getElementById('leg-nino').style.display = 'none';
            if (event.name === "5° Global Grid") document.getElementById('leg-grid').style.display = 'none';
            if (event.name === "Live Radar") document.getElementById('leg-radar').style.display = 'none';
            if (event.name === "Sea Surface Temp (SST)") document.getElementById('leg-sst').style.display = 'none';
            if (event.name === "SST Anomaly") document.getElementById('leg-ssta').style.display = 'none';
        });
    </script>
</body>
</html>
