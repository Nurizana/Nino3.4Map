<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Niño 3.4 Interactive Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }

        /* Legend styling */
        .legend-box {
            position: fixed;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border: 2px solid #333;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            z-index: 9999;
            display: none; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        #leg-nino { top: 15px; }
        #leg-radar { top: 95px; width: 230px; }

        /* Radar Color Bar */
        .color-bar {
            width: 100%;
            height: 12px;
            margin-top: 8px;
            background: linear-gradient(to right, #00ffff, #0000ff, #00ff00, #ffff00, #ff9900, #ff0000, #ff00ff);
            border: 1px solid #777;
            border-radius: 2px;
        }
        .color-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-top: 3px;
            font-weight: bold;
        }
        /* Custom tooltip for the grid */
        .grid-tooltip {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="leg-nino" class="legend-box">
        <b>Niño 3.4 Region</b><br>
        <span style="color: green; font-weight: bold;">- - - - - - -</span><br>
        5°N to 5°S, 170°W to 120°W
    </div>

    <div id="leg-radar" class="legend-box">
        <b>Live Weather Radar</b><br>
        Updated: <span id="time-display">Fetching live data...</span><br>
        <div class="color-bar"></div>
        <div class="color-labels">
            <span>0.1</span>
            <span>1</span>
            <span>5</span>
            <span>10</span>
            <span>25</span>
            <span>50</span>
            <span>100+ mm/h</span>
        </div>
    </div>

    <script>
        // 1. Initialize Map
        var map = L.map('map', { center: [0, -150], zoom: 4 });

        // 2. Add Blue Ocean Basemaps
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Ocean Base'
        }).addTo(map);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Labels'
        }).addTo(map);

        // 3. LAYER: Niño 3.4 Box (Thickened)
        var ninoBox = L.rectangle([[-5, -170], [5, -120]], {
            color: 'green',
            weight: 4,          // Increased thickness
            fill: false,
            dashArray: '8, 8'   // Adjusted dash pattern
        }).addTo(map);
        document.getElementById('leg-nino').style.display = 'block';

        // 4. LAYER: 5-Degree Grid with Tooltips
        var gridFeatures = [];
        // Generate Latitudes
        for (var lat = -85; lat <= 85; lat += 5) {
            var latLabel = lat > 0 ? lat + "° N" : (lat < 0 ? Math.abs(lat) + "° S" : "Equator");
            gridFeatures.push({
                "type": "Feature",
                "geometry": { "type": "LineString", "coordinates": [[-180, lat], [180, lat]] },
                "properties": { "name": latLabel }
            });
        }
        // Generate Longitudes
        for (var lon = -180; lon <= 180; lon += 5) {
            var lonLabel = lon > 0 ? lon + "° E" : (lon < 0 ? Math.abs(lon) + "° W" : "Prime Meridian");
            if (lon === 180 || lon === -180) lonLabel = "180° Anti-Meridian";
            gridFeatures.push({
                "type": "Feature",
                "geometry": { "type": "LineString", "coordinates": [[lon, -90], [lon, 90]] },
                "properties": { "name": lonLabel }
            });
        }
        var gridLayer = L.geoJSON(gridFeatures, {
            style: { color: "#666", weight: 1, opacity: 0.5, dashArray: "2, 4" },
            onEachFeature: function (feature, layer) {
                layer.bindTooltip(feature.properties.name, { sticky: true, className: 'grid-tooltip' });
            }
        });

        // 5. LAYER: Live Radar Data
        var radarLayer = L.tileLayer('', { opacity: 0.6, attribution: 'RainViewer' });
        
        // Fetch the absolute latest UNIX timestamp from Rainviewer to make the tiles load correctly
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(res => res.json())
            .then(data => {
                var latestTime = data.radar.past[data.radar.past.length - 1].time;
                // Color scheme 2 matches the legend gradient we built
                radarLayer.setUrl('https://tilecache.rainviewer.com/v2/radar/' + latestTime + '/256/{z}/{x}/{y}/2/1_1.png');
                document.getElementById('time-display').innerText = new Date(latestTime * 1000).toUTCString();
            })
            .catch(e => {
                document.getElementById('time-display').innerText = "Data temporarily unavailable";
            });

        // 6. Layer Controls
        var overlayMaps = {
            "Niño 3.4 Region": ninoBox,
            "5° Global Grid": gridLayer,
            "Live Radar": radarLayer
        };
        L.control.layers(null, overlayMaps, { position: 'topleft' }).addTo(map);

        // 7. Dynamic Legend Toggling
        map.on('overlayadd', function(event) {
            if (event.name === "Niño 3.4 Region") document.getElementById('leg-nino').style.display = 'block';
            if (event.name === "Live Radar") document.getElementById('leg-radar').style.display = 'block';
        });

        map.on('overlayremove', function(event) {
            if (event.name === "Niño 3.4 Region") document.getElementById('leg-nino').style.display = 'none';
            if (event.name === "Live Radar") document.getElementById('leg-radar').style.display = 'none';
        });
    </script>
</body>
</html>
